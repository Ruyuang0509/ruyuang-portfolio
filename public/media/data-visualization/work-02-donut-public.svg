<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">欄位筆數圓環圖示意</title>
  <desc id="desc">概念化圓環圖，說明圖表計算 sn 欄位筆數，不解釋 sn 的實際意義，也不含原始資料或真實分析值。</desc>
  <rect width="900" height="900" fill="#f4ecdc"/>
  <circle cx="450" cy="410" r="190" fill="none" stroke="#1c2938" stroke-width="94" opacity="0.18"/>
  <path d="M450 220 A190 190 0 1 1 283 501" fill="none" stroke="#cbe86b" stroke-width="94" stroke-linecap="round"/>
  <path d="M283 501 A190 190 0 0 1 378 234" fill="none" stroke="#7dc4ff" stroke-width="94" stroke-linecap="round"/>
  <text x="112" y="735" fill="#1c2938" font-family="PingFang TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="900">計算欄位筆數</text>
  <text x="112" y="790" fill="#1c2938" font-family="PingFang TC, Microsoft JhengHei, sans-serif" font-size="26" font-weight="600">不解釋欄位意義，也不呈現真實比例。</text>
</svg>
